services:
  queplaneshoy:
    image: ghcr.io/alexisb1v1/queplaneshoy:latest
    container_name: queplaneshoy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # Tamaño máximo de cada archivo de log (10 Megabytes)
        max-file: "3"     # Mantener máximo 3 archivos históricos
    environment:
      PORT: 3000
      NODE_ENV: production
    networks:
      - centralafbv_prod

networks:
  centralafbv_prod:
    external: true
